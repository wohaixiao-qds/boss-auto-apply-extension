<!--
  合成 fixture（SYNTHETIC）：模拟 BOSS 直聘沟通/聊天弹窗结构。
  .chat-container 内含 textarea（消息输入）+ 发送按钮。
  选择器对齐 src/agent/snapshot.ts 的 regionOf（[class*='chat']）。
  待真实样本替换（见 tests/integration/FIXTURE-CAPTURE.md）。
-->
<div class="chat-container" ka="chat-box">
  <div class="chat-header">
    <span class="name">招聘官·张先生</span>
    <a class="close" ka="chat-close">关闭</a>
  </div>
  <div class="chat-message-input">
    <!-- textarea 含已填入的打招呼内容（模拟 message_filled 阶段）；
         snapshotPage 按 textOf 长度>0 过滤，空 textarea 不会被捕获，
         故此处给初始内容以校验 chat 区输入识别 -->
    <textarea class="chat-input" placeholder="输入你要发送的内容…">您好，对该岗位很感兴趣</textarea>
    <button class="btn-send" ka="chat-send">发送</button>
  </div>
</div>
