<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>BOSS 求职 Agent 设置</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>岗位筛选设置</h1>
      <p class="notice">这里定义 Agent 在 BOSS 页面上要使用的查询条件。保存后，Agent 会先填写搜索框和筛选器，再自动翻页收集岗位。</p>

      <fieldset>
        <legend>岗位查询条件</legend>
        <div class="filter-grid">
          <div class="filter-field filter-field-wide">
            <label for="jobKeywords">岗位关键词</label>
            <input id="jobKeywords" placeholder="例如：ai agent 工程师；多个关键词用逗号分隔" />
          </div>
          <div class="filter-field">
            <label for="targetLocations">目标城市</label>
            <div class="multi-select" id="targetLocationsSelect" data-field="targetLocations"></div>
          </div>
          <div class="filter-field">
            <label for="targetSalary">期望薪资</label>
            <div class="multi-select" id="targetSalarySelect" data-field="targetSalary"></div>
          </div>
          <div class="filter-field">
            <label for="jobTypes">求职类型</label>
            <div class="multi-select" id="jobTypesSelect" data-field="jobTypes"></div>
          </div>
          <div class="filter-field">
            <label for="workExperience">工作经验</label>
            <div class="multi-select" id="workExperienceSelect" data-field="workExperience"></div>
          </div>
          <div class="filter-field">
            <label for="education">学历要求</label>
            <div class="multi-select" id="educationSelect" data-field="education"></div>
          </div>
          <div class="filter-field">
            <label for="companyIndustries">公司行业</label>
            <div class="multi-select" id="companyIndustriesSelect" data-field="companyIndustries"></div>
          </div>
          <div class="filter-field">
            <label for="companySizes">公司规模</label>
            <div class="multi-select" id="companySizesSelect" data-field="companySizes"></div>
          </div>
        </div>
        <div class="number-grid">
          <label>最大翻页数<input id="maxPages" type="number" min="1" max="20" placeholder="5" /></label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Agent 与模型</legend>
        <label class="checkbox"><input id="agentAutoStart" type="checkbox" /> 打开控制台后自动开始<span class="tokens">（当前不生效，需手动点「开始智能筛选」）</span></label>
        <label class="checkbox"><input id="aiEnabled" type="checkbox" /> 启用模型匹配和理由</label>
        <label>API Base URL（中转地址）<input id="aiBaseUrl" placeholder="https://api.openai.com/v1" /></label>
        <label>模型名称<input id="aiModel" placeholder="gpt-4o-mini" /></label>
        <label>API Key<input id="aiApiKey" type="password" autocomplete="off" /></label>
        <button id="testAi" type="button" class="test">测试模型连接</button><span id="testAiStatus" class="test-status"></span>
        <p class="tokens">中转地址填写到 /v1，插件会请求 /chat/completions。</p>
      </fieldset>

      <fieldset>
        <legend>费用与打招呼</legend>
        <label>费用阈值（元，超出则停止）<input id="costThresholdYuan" type="number" min="0" step="0.01" placeholder="5" /></label>
        <label>输入单价（元 / 百万 token）<input id="inputPriceYuanPerMillion" type="number" min="0" step="0.01" placeholder="0" /></label>
        <label>输出单价（元 / 百万 token）<input id="outputPriceYuanPerMillion" type="number" min="0" step="0.01" placeholder="0" /></label>
        <label>打招呼上限（人）<input id="greetCap" type="number" min="0" step="1" placeholder="10" /></label>
        <label>打招呼话术<textarea id="greetMessage" rows="3" placeholder="您好，对这个岗位很感兴趣，希望进一步沟通"></textarea></label>
      </fieldset>

      <button id="save">保存岗位筛选设置</button>
      <span id="status"></span>
    </main>
    <script src="options.js"></script>
  </body>
</html>
